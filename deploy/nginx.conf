events {}

http {
    upstream qwenchana_app {
        server app:8000;
    }

    limit_req_zone $binary_remote_addr zone=generate_per_client:10m rate=2r/m;
    limit_conn_zone $server_name zone=generate_concurrency:10m;

    server {
        listen 80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        send_timeout 3600s;

        location = /generate {
            limit_req zone=generate_per_client burst=1 nodelay;
            limit_conn generate_concurrency 1;
            proxy_pass http://qwenchana_app;
        }

        location / {
            proxy_pass http://qwenchana_app;
        }
    }
}
